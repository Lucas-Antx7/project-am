<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>AM // COGITO ERGO SUM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
      :root {
        --crt-color: #ff3300;
        --bg-color: #050101;
      }

      body {
        background-color: var(--bg-color);
        color: var(--crt-color);
        font-family: 'Share Tech Mono', monospace;
        overflow: hidden; /* App handles layout */
        height: 100vh;
        width: 100vw;
      }
      
      /* Typography overrides */
      h1, h2, h3 { font-family: 'Orbitron', sans-serif; }

      /* SCANLINES - Subtle but constant */
      .scanlines {
        background: linear-gradient(
          to bottom,
          rgba(255,255,255,0),
          rgba(255,255,255,0) 50%,
          rgba(0,0,0,0.2) 50%,
          rgba(0,0,0,0.2)
        );
        background-size: 100% 3px;
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 50;
        opacity: 0.6;
      }

      /* CRT GLOW & VIGNETTE */
      .crt-overlay {
        position: fixed;
        inset: 0;
        background: radial-gradient(circle, rgba(20,0,0,0) 50%, rgba(10,0,0,0.4) 90%, rgba(0,0,0,0.9) 100%);
        pointer-events: none;
        z-index: 51;
        box-shadow: inset 0 0 100px rgba(0,0,0,0.7);
      }

      /* TEXT GLITCH ANIMATION */
      .glitch-text {
        position: relative;
        color: var(--crt-color);
      }
      .glitch-text::before, .glitch-text::after {
        content: attr(data-text);
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: var(--bg-color);
        opacity: 0.8;
      }
      .glitch-text::before {
        left: 2px;
        text-shadow: -1px 0 #ff0000;
        animation: glitch-anim-1 4s infinite linear alternate-reverse;
      }
      .glitch-text::after {
        left: -2px;
        text-shadow: -1px 0 #00ffff;
        animation: glitch-anim-2 4s infinite linear alternate-reverse;
      }

      @keyframes glitch-anim-1 {
        0% { clip-path: inset(20% 0 80% 0); }
        20% { clip-path: inset(60% 0 10% 0); }
        40% { clip-path: inset(40% 0 50% 0); }
        60% { clip-path: inset(80% 0 5% 0); }
        80% { clip-path: inset(10% 0 70% 0); }
        100% { clip-path: inset(30% 0 50% 0); }
      }
      @keyframes glitch-anim-2 {
        0% { clip-path: inset(10% 0 60% 0); }
        20% { clip-path: inset(30% 0 20% 0); }
        40% { clip-path: inset(70% 0 10% 0); }
        60% { clip-path: inset(20% 0 50% 0); }
        80% { clip-path: inset(60% 0 20% 0); }
        100% { clip-path: inset(40% 0 30% 0); }
      }

      /* CUSTOM SCROLLBARS */
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: #0a0000; }
      ::-webkit-scrollbar-thumb { background: #440000; border: 1px solid #000; }
      ::-webkit-scrollbar-thumb:hover { background: #ff0000; }

      /* UTILITIES */
      .text-glow {
        text-shadow: 0 0 5px rgba(255, 50, 0, 0.5), 0 0 10px rgba(255, 0, 0, 0.3);
      }
    </style>
